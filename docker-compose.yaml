version: "3.8"

services:
  api:
    build: ./
    container_name: parking-api-thaivivat
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:89058905@mysql:3306/parking-thaivivat
      PORT: 8080
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: parking-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 89058905
      MYSQL_DATABASE: parking-thaivivat
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
